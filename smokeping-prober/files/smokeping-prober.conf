config daemon 'daemon'
	option listen "127.0.0.1:9374"
	option telemetry_path "/metrics"
	option log_level "info"
	option log_format "logfmt"
	option enabled "1"
	option ping_interval "1s"
	option ping_size "56"
	option ping_tos "0x00"
	option ping_network "ip"
	option ping_protocol "icmp"
	# option ping_source "127.0.0.1"
	option privileged "1"
	# optional manual config path; if unset, config is generated from UCI into /var/etc/smokeping-prober.yml
	# option config_file "/etc/smokeping-prober.yml"
	# option buckets "5e-05,0.0001,0.0002,0.0004,0.0008,0.0016,0.0032,0.0064,0.0128,0.0256,0.0512,0.1024,0.2048,0.4096,0.8192,1.6384,3.2768,6.5536,13.1072,26.2144"
	# list host "1.1.1.1"
	# list host "8.8.8.8"
	# list label "instance=router"
	# list env "GOMAXPROCS=1"
	# list extra_arg "--native-histogram-factor=1.05"

config target 'wan'
	option enabled "0"
	option interval "1s"
	option network "ip"
	option protocol "icmp"
	option size "56"
	option tos "0x00"
	# option source "127.0.0.1"
	list host "1.1.1.1"
	list host "8.8.8.8"
	# list label "group=wan"
